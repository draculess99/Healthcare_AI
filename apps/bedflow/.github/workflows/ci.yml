name: BedFlow CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Scan release content for secrets
        run: python scripts/check_secrets.py .

      - name: Compile Python sources
        run: python -m compileall -q backend frontend scripts training app.py

      - name: Run automated tests
        env:
          BEDFLOW_AUTH_SECRET: ci-only-bedflow-auth-secret-change-before-deploy
          BEDFLOW_DEMO_PASSWORD: BedFlowDemo!
          BEDFLOW_LOG_FORMAT: text
        run: pytest -q

      - name: Run backend smoke test
        env:
          BEDFLOW_AUTH_SECRET: ci-only-bedflow-auth-secret-change-before-deploy
          BEDFLOW_DEMO_PASSWORD: BedFlowDemo!
          BEDFLOW_LOG_FORMAT: text
        run: python backend/smoke_test_bedflow.py

      - name: Build clean release package
        run: python scripts/package_release.py --root . --output dist/bedflow_ai_release.zip

      - name: Upload clean release artifact
        uses: actions/upload-artifact@v4
        with:
          name: bedflow-ai-release
          path: dist/bedflow_ai_release.zip
          if-no-files-found: error
